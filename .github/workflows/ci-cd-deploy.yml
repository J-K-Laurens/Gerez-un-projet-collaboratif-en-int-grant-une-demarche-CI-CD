on:
  push:
    branches:
      - main

name: CI/CD - Build, Scan & Deploy

permissions:
  contents: read
  packages: write

env:
  REGISTRY: docker.io

jobs:
  call-common-build:
    uses: ./.github/workflows/common-build.yml
    secrets: inherit

  # Build Docker images - Backend + Frontend
  build-docker:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: call-common-build
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - service: backend
            context: ./back
          - service: frontend
            context: ./front
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      # Extract Docker metadata
      - name: Extract metadata for ${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      # Build Docker image
      - name: Build Docker image for ${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=docker,dest=/tmp/${{ matrix.service }}-image.tar

      # Combine Docker image and metadata into single artifact
      - name: Prepare Docker build output
        run: |
          mkdir -p /tmp/docker-build-${{ matrix.service }}
          mv /tmp/${{ matrix.service }}-image.tar /tmp/docker-build-${{ matrix.service }}/image.tar
          echo "${{ steps.meta.outputs.tags }}" > /tmp/docker-build-${{ matrix.service }}/tags.txt

      - name: Upload Docker build output
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-${{ matrix.service }}
          path: /tmp/docker-build-${{ matrix.service }}/
          retention-days: 1

  # Push Docker images to DockerHub
  push-docker:
    name: 📤 Push Docker Images
    runs-on: ubuntu-latest
    needs: build-docker
    timeout-minutes: 15
    strategy:
      matrix:
        service: [backend, frontend]
    
    steps:
      # Validate required secrets
      - name: Validate Docker credentials
        run: |
          [[ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]] || { echo "ERROR: DOCKERHUB_USERNAME not set"; exit 1; }
          [[ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]] || { echo "ERROR: DOCKERHUB_TOKEN not set"; exit 1; }

      # Login to DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Download combined Docker build output
      - name: Download Docker build output
        uses: actions/download-artifact@v4
        with:
          name: docker-build-${{ matrix.service }}
          path: /tmp/docker-build-${{ matrix.service }}

      # Load and push Docker image with retry
      - name: Load and push ${{ matrix.service }} image
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 6
          max_attempts: 3
          command: |
            set -e
            [[ -f "/tmp/docker-build-${{ matrix.service }}/image.tar" ]] || { echo "ERROR: Docker image not found"; exit 1; }
            [[ -f "/tmp/docker-build-${{ matrix.service }}/tags.txt" ]] || { echo "ERROR: Tags file not found"; exit 1; }
            docker load --input /tmp/docker-build-${{ matrix.service }}/image.tar
            tags=$(cat /tmp/docker-build-${{ matrix.service }}/tags.txt)
            [[ -n "$tags" ]] || { echo "ERROR: No tags found"; exit 1; }
            echo "$tags" | while IFS= read -r tag; do
              [[ -n "$tag" ]] && docker push "$tag"
            done
