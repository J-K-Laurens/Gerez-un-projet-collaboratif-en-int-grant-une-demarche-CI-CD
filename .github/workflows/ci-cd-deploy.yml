on:
  push:
    branches:
      - main

name: CI/CD - Build, Scan & Deploy

env:
  REGISTRY: docker.io

jobs:
  call-common-build:
    uses: ./.github/workflows/common-build.yml
    secrets: inherit

  # Build Docker images - Backend + Frontend
  build-docker:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: call-common-build
    strategy:
      matrix:
        include:
          - service: backend
            context: ./back
          - service: frontend
            context: ./front
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Extract Docker metadata
      - name: Extract metadata for ${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      # Build Docker image
      - name: Build Docker image for ${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=docker,dest=/tmp/${{ matrix.service }}-image.tar

      # Upload Docker image artifact
      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.service }}
          path: /tmp/${{ matrix.service }}-image.tar
          retention-days: 1

  # Push Docker images to DockerHub
  push-docker:
    name: 📤 Push Docker Images
    runs-on: ubuntu-latest
    needs: build-docker
    if: success()
    strategy:
      matrix:
        service: [backend, frontend]
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Login to DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for ${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      # Download Docker image artifact
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ matrix.service }}
          path: /tmp

      # Load and push Docker image
      - name: Load and push ${{ matrix.service }} image
        run: |
          docker load --input /tmp/${{ matrix.service }}-image.tar
          for tag in ${{ steps.meta.outputs.tags }}; do
            docker push "$tag"
          done
