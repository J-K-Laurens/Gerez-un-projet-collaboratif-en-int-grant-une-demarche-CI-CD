name: Common Build & Quality

on:
  workflow_call:

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'
  SONAR_ORG: j-k-laurens
  SONAR_URL: https://sonarcloud.io
  SONAR_PROJECT_KEY: J-K-Laurens_Gerez-un-projet-collaboratif-en-int-grant-une-demarche-CI-CD

jobs:
  # Build & Test - Backend + Frontend
  build-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: front/package-lock.json

      # Build & test backend
      - name: Build and test backend
        run: mvn clean verify -f back/pom.xml

      # Build & test frontend
      - name: Build and test frontend
        working-directory: front
        run: |
          npm ci
          npm run build --if-present
          npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

      # Upload build artifacts for reuse in code-quality job
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            back/target/
            front/coverage/
          retention-days: 1

  # Code Quality - SonarQube
  code-quality:
    name: 🔍 Code Quality (SonarQube)
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      # Download pre-built artifacts instead of rebuilding
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      # Sonar scan - Full project
      - name: SonarQube Scan - Full Project
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_ORG }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.host.url=${{ env.SONAR_URL }}
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Upload coverage reports
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            back/target/site/jacoco/
            front/coverage/
          retention-days: 30
