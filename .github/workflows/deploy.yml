on:
  push:
    branches:
      - main

name: Build and Deploy Docker

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Build and test backend with Maven
      run: mvn clean verify -f back/pom.xml
    
    - name: Build and test frontend
      working-directory: front
      run: |
        npm ci
        npm run build --if-present
        npm test -- --watch=false --browsers=ChromeHeadless --code-coverage
    
    - name: SonarQube Scan - Backend (Maven)
      run: mvn sonar:sonar -f back/pom.xml -Dsonar.organization=j-k-laurens -Dsonar.projectKey=J-K-Laurens_Gerez-un-projet-collaboratif-en-int-grant-une-demarche-CI-CD -Dsonar.host.url=https://sonarcloud.io -Dsonar.sources=src/main/java -Dsonar.tests=src/test/java -Dsonar.java.binaries=target/classes
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    
    - name: SonarQube Scan - Frontend
      uses: SonarSource/sonarqube-scan-action@v5.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Extract metadata for backend
      id: meta-backend
      uses: docker/metadata-action@v4
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-backend
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
          type=raw,value=latest
    
    - name: Extract metadata for frontend
      id: meta-frontend
      uses: docker/metadata-action@v4
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-frontend
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
          type=raw,value=latest
    
    - name: Build and push backend Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./back
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
    
    - name: Build and push frontend Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./front
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
    
    - name: Upload JaCoCo Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jacoco-report
        path: back/target/site/jacoco/
        retention-days: 30
    
    - name: Upload Frontend Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-coverage-report
        path: front/coverage/
        retention-days: 30
