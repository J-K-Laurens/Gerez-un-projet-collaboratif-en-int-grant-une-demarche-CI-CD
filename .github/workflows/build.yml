on:
  push:
    branches:
      - main
  pull_request:
      types: [opened, synchronize, reopened]

name: Main Workflow

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build and test backend with Maven
      run: mvn clean verify -f back/pom.xml
    - name: Copy Maven dependencies for SonarQube analysis
      run: mvn dependency:copy-dependencies -f back/pom.xml -DoutputDirectory=back/target/dependency
    - name: Build and test frontend
      working-directory: front
      run: |
        npm ci
        npm run build --if-present
        npm test -- --watch=false --browsers=ChromeHeadless --code-coverage
    - name: SonarQube Scan - Backend (Maven)
      run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:3.9.1.2184:sonar -f back/pom.xml -Dsonar.organization=j-k-laurens -Dsonar.projectKey=J-K-Laurens_Gerez-un-projet-collaboratif-en-int-grant-une-demarche-CI-CD -Dsonar.host.url=https://sonarcloud.io -Dsonar.sources=src/main/java -Dsonar.tests=src/test/java -Dsonar.java.binaries=target/classes
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    - name: SonarQube Scan - Frontend
      uses: SonarSource/sonarqube-scan-action@v5.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    - name: Upload JaCoCo Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jacoco-report
        path: back/target/site/jacoco/
        retention-days: 30
    - name: Upload Frontend Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-coverage-report
        path: front/coverage/
        retention-days: 30